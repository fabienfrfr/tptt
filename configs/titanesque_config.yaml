defaults:
  dataset: "alpaca-cleaned"
  dataset_percentage: 0.10 # ~5000 samples
  padding: "longest"
  max_length: 386
  seed: 42
  test_samples: 2
  run_test_eval: true # Run trainer.predict after training
  lora: true
  batch_size: "auto" # Manage OoM
  tokenizer: "auto"
  training_config: "standard"
  log_metrics: true # Store TrainOutput metrics
  platform: "Kaggle" # or "Local"
  hardware_target: "2xT4"
  operator_modes: "delta_product"
  linear_precision: "bfloat16"
  cross_gate_mode: false
  max_chunk_size:
    delta_rule: 64
    delta_product: 32
  save_model_dir: "./Titans-v2"

lora_config:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules: "auto"

training_config:
  - standard:
      epochs: 1
      learning_rate: 5e-4
      weight_decay: 0.0
      gradient_accumulation_steps: 1
      max_grad_norm: 1.0
      logging_steps: 5
      save_steps: 1000
      save_total_limit: 2
      bf16: true
      evaluation_strategy: "steps"
      report_to: "tensorboard"

models:
  - name: "meta-llama/Llama-3.2-1B"
    type: "causal"
    quantized: false
    bidirectional: false

  - name: "Qwen/Qwen2.5-1.5B"
    type: "causal"
    quantized: false
    bidirectional: false

  - name: "apple/OpenELM-1_1B"
    tokenizer: "meta-llama/Llama-2-7b-hf"
    target_modules: ["qkv_proj", "out_proj"]
    type: "causal"
    quantized: false
    bidirectional: false

  - name: "mistralai/Mistral-7B-v0.3"
    type: "causal"
    quantized: true
    bidirectional: false

  - name: "allenai/OLMoE-1B-7B-0924"
    type: "causal"
    quantized: true
    bidirectional: false

  - name: "Dream-org/Dream-v0-Base-7B"
    type: "diffusion"
    causal: false
    bidirectional: true

base_variants:
  - method: "delta_rule"
    mag_weight: [0.5]
  - method: "delta_product"
    mag_weight: [0.5]

extra_variants:
  operator_modes:
    - method: "delta_rule+nonlinear"
      mag_weight: [0.5]
    - method: "delta_product+rotation"
      mag_weight: [0.5]
    - method: "delta_product+combined"
      mag_weight: [0.5]

  liza_callback:
    constant_values:
      - 0.125
      - 0.25
      - 0.5
      - 0.75
    transitions:
      - target: 0.5
        steps: [10, 100, 1000]
    switchs:
      - [0, 0.5]
      - [0, 1.0]
